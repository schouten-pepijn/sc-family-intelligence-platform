version: 2

models:
  - name: stg_bag_gpkg_verblijfsobject
    description: Staging view over the BAG GeoPackage verblijfsobject landing table.
    columns:
      - name: source_name
        tests:
          - not_null
      - name: natural_key
        tests:
          - not_null
      - name: retrieved_at
        tests:
          - not_null
      - name: run_id
        tests:
          - not_null
      - name: schema_version
        tests:
          - not_null
      - name: http_status
        tests:
          - not_null
      - name: bag_id
        tests:
          - not_null
      - name: verblijfsobject_identificatie
        tests:
          - not_null
  - name: stg_bag_gpkg_verblijfsobject_spatial
    description: Spatial BAG GeoPackage verblijfsobject staging table with WGS84 geometry.
    columns:
      - name: bag_id
        tests:
          - not_null
      - name: verblijfsobject_identificatie
        tests:
          - not_null
