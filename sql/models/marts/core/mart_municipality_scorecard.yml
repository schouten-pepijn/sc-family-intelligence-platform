version: 2

models:
  - name: mart_municipality_scorecard
    description: Municipality-level cross-source scorecard combining CBS metrics with BAG address coverage.
    columns:
      - name: scorecard_key
        tests:
          - not_null
          - unique
      - name: region_id
        tests:
          - not_null
      - name: region_title
        tests:
          - not_null
      - name: region_dimension_group_id
        tests:
          - not_null
      - name: period_year
        tests:
          - not_null
      - name: period_id
        tests:
          - not_null
      - name: measure_id
        tests:
          - not_null
      - name: measure_title
        tests:
          - not_null
      - name: observation_count
        tests:
          - not_null
      - name: mapped_address_count
        tests:
          - not_null
      - name: bag_adres_mapped_count
        tests:
          - not_null
      - name: locatieserver_mapped_count
        tests:
          - not_null
