version: 2

models:
  - name: mart_cbs_observations
    description: Serving-friendly observation model built from staged CBS observations.
    columns:
      - name: source_name
        tests:
          - not_null
      - name: natural_key
        tests:
          - not_null
      - name: retrieved_at
        tests:
          - not_null
      - name: run_id
        tests:
          - not_null
      - name: observation_id
        tests:
          - not_null
      - name: measure_code
        tests:
          - not_null
      - name: period_code
        tests:
          - not_null
      - name: region_code
        tests:
          - not_null
