version: 2

models:
  - name: mart_cbs_observations
    description: Business-friendly observation mart built from staged CBS observations.
    columns:
      - name: source_name
        tests:
          - not_null
      - name: run_id
        tests:
          - not_null
      - name: retrieved_at
        tests:
          - not_null
      - name: observation_key
        tests:
          - not_null
      - name: observation_id
        tests:
          - not_null
      - name: measure_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_measure')
                field: measure_id
      - name: measure_title
        tests:
          - not_null
      - name: period_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_period')
                field: period_id
      - name: period_title
        tests:
          - not_null
      - name: period_year
      - name: period_granularity
        tests:
          - not_null
      - name: period_status
        tests:
          - not_null
      - name: region_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_region')
                field: region_id
      - name: region_title
        tests:
          - not_null
      - name: observation_value
