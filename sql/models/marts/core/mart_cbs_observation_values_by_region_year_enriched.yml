version: 2

models:
  - name: mart_cbs_observation_values_by_region_year_enriched
    description: Aggregated CBS observations enriched with readable region, period, and measure metadata.
    columns:
      - name: region_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_region')
                field: region_id
      - name: region_title
        tests:
          - not_null
      - name: period_year
        tests:
          - not_null
      - name: period_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_period')
                field: period_id
      - name: period_title
        tests:
          - not_null
      - name: measure_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_measure')
                field: measure_id
      - name: measure_title
        tests:
          - not_null
      - name: observation_count
        tests:
          - not_null
