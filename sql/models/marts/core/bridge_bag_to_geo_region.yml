version: 2

models:
  - name: bridge_bag_to_geo_region
    description: Public spatial bridge from BAG objects to the conformed geo region dimension.
    columns:
      - name: bag_object_id
        tests:
          - not_null
      - name: bag_object_type
        tests:
          - not_null
      - name: region_id
        tests:
          - not_null
      - name: mapping_method
        tests:
          - not_null
      - name: confidence
      - name: active_from
      - name: active_to
