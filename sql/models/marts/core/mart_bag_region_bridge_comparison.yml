version: 2

models:
  - name: mart_bag_region_bridge_comparison
    description: Compare legacy BAG geo-region mapping against the spatial municipality bridge.
    columns:
      - name: bag_object_id
        tests:
          - not_null
          - unique
      - name: bag_object_type
        tests:
          - not_null
      - name: adres_identificatie
        tests:
          - not_null
      - name: postcode
      - name: bag_gemeentecode
      - name: bag_gemeentenaam
      - name: legacy_region_id
      - name: legacy_region_title
      - name: legacy_mapping_method
      - name: legacy_match_count
        tests:
          - not_null
      - name: spatial_region_id
      - name: spatial_region_title
      - name: spatial_match_count
        tests:
          - not_null
      - name: comparison_status
        tests:
          - not_null
