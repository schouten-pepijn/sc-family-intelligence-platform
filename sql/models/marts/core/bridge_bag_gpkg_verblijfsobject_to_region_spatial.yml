version: 2

models:
  - name: bridge_bag_gpkg_verblijfsobject_to_region_spatial
    description: V2 spatial bridge from BAG GeoPackage verblijfsobject points to municipality regions.
    columns:
      - name: bag_object_id
        tests:
          - not_null
      - name: bag_object_type
        tests:
          - not_null
      - name: region_id
        tests:
          - not_null
      - name: mapping_method
        tests:
          - not_null
      - name: confidence
      - name: active_from
      - name: active_to
