repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
      - id: ruff-format
  - repo: https://github.com/callowayproject/bump-my-version
    rev: 1.2.4
    hooks:
      - id: bump-my-version
        args: ["show-bump"]
