version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  env:
    desc: Create .env from .env.template if it does not exist
    cmds:
      - >-
        python -c "from pathlib import Path; src = Path('.env.template'); dst = Path('.env');
        print('Created .env from .env.template') if not dst.exists() and dst.write_text(src.read_text())
        is not None else print('.env already exists')"

  setup:
    desc: Install dependencies and start the local infra with the RustFS bucket initialized
    cmds:
      - task: env
      - task: install
      - task: sql-install
      - task: infra-init

  install:
    desc: Install project dependencies, including dev tools
    cmds:
      - uv sync --dev

  sql-install:
    desc: Install local dbt dependencies for the sql project
    cmds:
      - uv sync --project sql

  infra-up:
    desc: Start the local RustFS, Postgres, and Polaris stack
    cmds:
      - docker compose up -d rustfs postgres polaris

  infra-down:
    desc: Stop the local RustFS, Postgres, PostGIS, and Polaris stack
    cmds:
      - docker compose down --remove-orphans

  infra-vol-down:
    desc: Stop the stack and remove volumes (data will be lost)
    cmds:
      - docker compose down -v --remove-orphans

  reset-data:
    desc: Stop the stack, remove volumes, and clear local generated data
    cmds:
      - docker compose down -v --remove-orphans
      - >-
        python -c "from pathlib import Path; import shutil;
        paths = [Path('.raw-smoke'), Path('.duckdb'), Path('sql/target'), Path('sql/logs')];
        [shutil.rmtree(path, ignore_errors=True) for path in paths]"

  infra-init:
    desc: Ensure the local RustFS bucket and Polaris catalog are initialized
    cmds:
      - task: infra-up
      - docker compose --profile init run --rm --no-deps rustfs-init
      - docker compose --profile init run --rm --no-deps polaris-setup

  format:
    desc: Format the codebase
    cmds:
      - uv run ruff format .

  lint:
    desc: Run lint checks
    cmds:
      - uv run ruff check .

  lint-fix:
    desc: Run lint checks and apply safe fixes
    cmds:
      - uv run ruff check . --fix

  typecheck:
    desc: Run mypy on the src package
    cmds:
      - uv run mypy src

  test:
    desc: Run the unit test suite
    cmds:
      - task: test-unit

  test-unit:
    desc: Run unit tests only
    cmds:
      - uv run pytest tests/unit

  test-integration:
    desc: Run integration tests against the local lakehouse stack
    env:
      FIP_RUN_INTEGRATION: "1"
    cmds:
      - uv run pytest tests/integration -m integration

  test-spatial:
    desc: Run only the spatial integration validation test
    env:
      FIP_RUN_INTEGRATION: "1"
    cmds:
      - uv run pytest tests/integration/test_spatial_validations.py -q

  check-spatial-sql:
    desc: Run the SQL spatial health-check against the local Postgres container (no Python deps)
    cmds:
      - task: infra-up
      - docker compose exec -T postgres env PGPASSWORD="$POSTGRES_PASSWORD" psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -v ON_ERROR_STOP=1 -q < ops/postgres/spatial_health_check.sql

  test-raw:
    desc: Run the raw landing smoke test against RustFS
    cmds:
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id smoke-raw --target s3
      - >-
        docker compose --profile init run --rm --no-deps --entrypoint /bin/sh rustfs-init -lc 'aws --endpoint-url "$S3_ENDPOINT_INTERNAL"
        s3 ls "s3://$S3_BUCKET/raw/cbs/83625NED/smoke-raw/"'

  test-all:
    desc: Run unit and integration tests
    cmds:
      - task: test-unit
      - task: test-integration

  archive-region-geom:
    desc: Download CBS municipality geometries from PDOK and archive them to S3
    cmds:
      - uv run fip archive-region-geom --year 2025 --run-id region-geom-2025 --target s3

  build-region-geom:
    desc: Load authoritative region polygons into landing.region_geom
    cmds:
      - uv run python -c "from pathlib import Path; import sys; uri = r'{{.REGION_GEOM_INPUT}}'; sys.exit(0 if uri.startswith('s3://') or Path(uri).is_file() else 1)"
      - uv run fip build-region-geom --input "{{.REGION_GEOM_INPUT}}" --table region_geom

  load-region-geom:
    desc: Download CBS municipality geometries from PDOK, archive them to S3, and load landing.region_geom
    cmds:
      - uv run fip load-region-geom --year 2025 --run-id region-geom-2025 --target s3

  cbs-flow:
    desc: "Run the CBS-only local flow: raw, bronze, silver, landing, and dbt"
    cmds:
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id smoke-flow --target s3
      - uv run fip build-gold-measure-codes --table-id 83625NED --run-id smoke-flow --raw-target s3
      - uv run fip build-gold-period-codes --table-id 83625NED --run-id smoke-flow --raw-target s3
      - uv run fip build-gold-region-codes --table-id 83625NED --run-id smoke-flow --raw-target s3
      - uv run fip ingest-cbs --table-id 83625NED --run-id smoke-flow --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_83625ned --run-id smoke-flow
      - uv run fip build-landing-observations --table cbs_observations_flat_83625ned --run-id smoke-flow
      - uv run fip archive-cbs-raw --table-id 85035NED --run-id smoke-flow --target s3
      - uv run fip build-gold-measure-codes --table-id 85035NED --run-id smoke-flow --raw-target s3
      - uv run fip build-gold-period-codes --table-id 85035NED --run-id smoke-flow --raw-target s3
      - uv run fip build-gold-region-codes --table-id 85035NED --run-id smoke-flow --raw-target s3
      - uv run fip ingest-cbs --table-id 85035NED --run-id smoke-flow --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_85035ned --silver-table cbs_observations_flat_85035ned --run-id smoke-flow
      - uv run fip build-landing-observations --table cbs_observations_flat_85035ned --landing-table cbs_observations_85035ned --run-id smoke-flow
      - task: load-region-geom
      - task: dbt-debug
      - task: dbt-run
      - task: dbt-test

  load-woz:
    desc: "Load the CBS 85036NED observations flow, including raw, bronze, silver, landing, and dbt"
    cmds:
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 85036NED --run-id woz-load --target s3
      - uv run fip build-gold-eigendom-codes --table-id 85036NED --run-id woz-load --raw-target s3
      - uv run fip ingest-cbs --table-id 85036NED --run-id woz-load --limit 10000 --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_85036ned --silver-table cbs_observations_flat_85036ned --run-id woz-load
      - uv run fip build-landing-observations --table cbs_observations_flat_85036ned --landing-table cbs_observations_85036ned --run-id woz-load
      - task: dbt-debug
      - task: dbt-run-woz
      - task: dbt-test-woz

  load-housing:
    desc: "Alias for the smoke load path that now also materializes 85035NED for the housing mart"
    cmds:
      - task: load-smoke

  load-all:
    desc: "Load the full CBS + BAG data flow, including bridge and dbt models"
    cmds:
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id load-all --target s3
      - uv run fip archive-bag-raw --run-id load-all --collection verblijfsobject --target s3
      - uv run fip archive-bag-raw --run-id load-all --collection pand --target s3
      - uv run fip archive-bag-raw --run-id load-all --collection adres --target s3
      - uv run fip build-gold-measure-codes --table-id 83625NED --run-id load-all --raw-target s3
      - uv run fip build-gold-period-codes --table-id 83625NED --run-id load-all --raw-target s3
      - uv run fip build-gold-region-codes --table-id 83625NED --run-id load-all --raw-target s3
      - uv run fip ingest-cbs --table-id 83625NED --run-id load-all --raw-target s3
      - uv run fip ingest-bag --collection verblijfsobject --run-id load-all --raw-target s3
      - uv run fip ingest-bag --collection pand --run-id load-all --raw-target s3
      - uv run fip ingest-bag --collection adres --run-id load-all --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_83625ned --run-id load-all
      - uv run fip build-bag-silver-verblijfsobject --run-id load-all
      - uv run fip build-bag-silver-pand --run-id load-all
      - uv run fip build-bag-silver-adressen --run-id load-all
      - uv run fip build-landing-observations --table cbs_observations_flat_83625ned --run-id load-all
      - uv run fip archive-cbs-raw --table-id 85036NED --run-id load-all --target s3
      - uv run fip build-gold-eigendom-codes --table-id 85036NED --run-id load-all --raw-target s3
      - uv run fip ingest-cbs --table-id 85036NED --run-id load-all --limit 10000 --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_85036ned --silver-table cbs_observations_flat_85036ned --run-id load-all
      - uv run fip build-landing-observations --table cbs_observations_flat_85036ned --landing-table cbs_observations_85036ned --run-id load-all
      - uv run fip archive-cbs-raw --table-id 85035NED --run-id load-all --target s3
      - uv run fip build-gold-measure-codes --table-id 85035NED --run-id load-all --raw-target s3
      - uv run fip build-gold-period-codes --table-id 85035NED --run-id load-all --raw-target s3
      - uv run fip build-gold-region-codes --table-id 85035NED --run-id load-all --raw-target s3
      - uv run fip ingest-cbs --table-id 85035NED --run-id load-all --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_85035ned --silver-table cbs_observations_flat_85035ned --run-id load-all
      - uv run fip build-landing-observations --table cbs_observations_flat_85035ned --landing-table cbs_observations_85035ned --run-id load-all
      - uv run fip build-bag-landing-verblijfsobject --run-id load-all
      - uv run fip build-bag-landing-pand --run-id load-all
      - uv run fip build-bag-landing-adressen --run-id load-all
      - uv run fip build-bag-geo-region-mapping --table bag_adressen_flat --run-id load-all
      - task: load-region-geom
      - task: dbt-run
      - task: dbt-test
      - task: dbt-run-woz
      - task: dbt-test-woz

  load-medium:
    desc: "Load the CBS + BAG data flow with medium BAG limits"
    cmds:
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id medium-load --target s3
      - uv run fip archive-bag-raw --run-id medium-load --collection verblijfsobject --target s3 --limit 1000
      - uv run fip archive-bag-raw --run-id medium-load --collection pand --target s3 --limit 1000
      - uv run fip archive-bag-raw --run-id medium-load --collection adres --target s3 --limit 1000
      - uv run fip build-gold-measure-codes --table-id 83625NED --run-id medium-load --raw-target s3
      - uv run fip build-gold-period-codes --table-id 83625NED --run-id medium-load --raw-target s3
      - uv run fip build-gold-region-codes --table-id 83625NED --run-id medium-load --raw-target s3
      - uv run fip ingest-cbs --table-id 83625NED --run-id medium-load --raw-target s3
      - uv run fip ingest-bag --collection verblijfsobject --run-id medium-load --limit 1000 --progress-every 100 --raw-target s3
      - uv run fip ingest-bag --collection pand --run-id medium-load --limit 1000 --progress-every 100 --raw-target s3
      - uv run fip ingest-bag --collection adres --run-id medium-load --limit 1000 --progress-every 100 --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_83625ned --run-id medium-load
      - uv run fip build-bag-silver-verblijfsobject --run-id medium-load
      - uv run fip build-bag-silver-pand --run-id medium-load
      - uv run fip build-bag-silver-adressen --run-id medium-load
      - uv run fip build-landing-observations --table cbs_observations_flat_83625ned --run-id medium-load
      - uv run fip archive-cbs-raw --table-id 85036NED --run-id medium-load --target s3
      - uv run fip build-gold-eigendom-codes --table-id 85036NED --run-id medium-load --raw-target s3
      - uv run fip ingest-cbs --table-id 85036NED --run-id medium-load --limit 10000 --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_85036ned --silver-table cbs_observations_flat_85036ned --run-id medium-load
      - uv run fip build-landing-observations --table cbs_observations_flat_85036ned --landing-table cbs_observations_85036ned --run-id medium-load
      - uv run fip archive-cbs-raw --table-id 85035NED --run-id medium-load --target s3
      - uv run fip build-gold-measure-codes --table-id 85035NED --run-id medium-load --raw-target s3
      - uv run fip build-gold-period-codes --table-id 85035NED --run-id medium-load --raw-target s3
      - uv run fip build-gold-region-codes --table-id 85035NED --run-id medium-load --raw-target s3
      - uv run fip ingest-cbs --table-id 85035NED --run-id medium-load --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_85035ned --silver-table cbs_observations_flat_85035ned --run-id medium-load
      - uv run fip build-landing-observations --table cbs_observations_flat_85035ned --landing-table cbs_observations_85035ned --run-id medium-load
      - uv run fip build-bag-landing-verblijfsobject --run-id medium-load
      - uv run fip build-bag-landing-pand --run-id medium-load
      - uv run fip build-bag-landing-adressen --run-id medium-load
      - uv run fip build-bag-geo-region-mapping --table bag_adressen_flat --run-id medium-load --limit 1000 --rows 20
      - task: load-region-geom
      - task: dbt-run
      - task: dbt-test
      - task: dbt-run-woz
      - task: dbt-test-woz

  load-smoke:
    desc: "Load the full CBS + BAG data flow with small limits"
    cmds:
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id smoke-load --target s3
      - uv run fip archive-bag-raw --run-id smoke-load --collection verblijfsobject --target s3 --limit 25
      - uv run fip archive-bag-raw --run-id smoke-load --collection pand --target s3 --limit 25
      - uv run fip archive-bag-raw --run-id smoke-load --collection adres --target s3 --limit 25
      - uv run fip build-gold-measure-codes --table-id 83625NED --run-id smoke-load --raw-target s3
      - uv run fip build-gold-period-codes --table-id 83625NED --run-id smoke-load --raw-target s3
      - uv run fip build-gold-region-codes --table-id 83625NED --run-id smoke-load --raw-target s3
      - uv run fip ingest-cbs --table-id 83625NED --run-id smoke-load --raw-target s3
      - uv run fip ingest-bag --collection verblijfsobject --run-id smoke-load --limit 25 --progress-every 5 --raw-target s3
      - uv run fip ingest-bag --collection pand --run-id smoke-load --limit 25 --progress-every 5 --raw-target s3
      - uv run fip ingest-bag --collection adres --run-id smoke-load --limit 25 --progress-every 5 --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_83625ned --run-id smoke-load
      - uv run fip build-bag-silver-verblijfsobject --run-id smoke-load
      - uv run fip build-bag-silver-pand --run-id smoke-load
      - uv run fip build-bag-silver-adressen --run-id smoke-load
      - uv run fip build-landing-observations --table cbs_observations_flat_83625ned --run-id smoke-load
      - uv run fip archive-cbs-raw --table-id 85036NED --run-id smoke-load --target s3
      - uv run fip build-gold-eigendom-codes --table-id 85036NED --run-id smoke-load --raw-target s3
      - uv run fip ingest-cbs --table-id 85036NED --run-id smoke-load --limit 10000 --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_85036ned --silver-table cbs_observations_flat_85036ned --run-id smoke-load
      - uv run fip build-landing-observations --table cbs_observations_flat_85036ned --landing-table cbs_observations_85036ned --run-id smoke-load
      - uv run fip archive-cbs-raw --table-id 85035NED --run-id smoke-load --target s3
      - uv run fip build-gold-measure-codes --table-id 85035NED --run-id smoke-load --raw-target s3
      - uv run fip build-gold-period-codes --table-id 85035NED --run-id smoke-load --raw-target s3
      - uv run fip build-gold-region-codes --table-id 85035NED --run-id smoke-load --raw-target s3
      - uv run fip ingest-cbs --table-id 85035NED --run-id smoke-load --raw-target s3
      - uv run fip build-cbs-silver-observations --table cbs_observations_85035ned --silver-table cbs_observations_flat_85035ned --run-id smoke-load
      - uv run fip build-landing-observations --table cbs_observations_flat_85035ned --landing-table cbs_observations_85035ned --run-id smoke-load
      - uv run fip build-bag-landing-verblijfsobject --run-id smoke-load
      - uv run fip build-bag-landing-pand --run-id smoke-load
      - uv run fip build-bag-landing-adressen --run-id smoke-load
      - uv run fip build-bag-geo-region-mapping --table bag_adressen_flat --run-id smoke-load --limit 25 --rows 5
      - task: load-region-geom
      - task: dbt-run
      - task: dbt-run-woz
      - task: dbt-test-smoke

  load-bag-gpkg-smoke:
    desc: "Smoke-test the BAG GeoPackage v2 flow with a small limit"
    cmds:
      - task: infra-init
      - uv run fip archive-bag-gpkg --run-id bag-gpkg-smoke --source-ref data/pdok-bag/bag-light.gpkg --layer verblijfsobject --target s3 --limit 25
      - uv run fip ingest-bag-gpkg --run-id bag-gpkg-smoke --layer verblijfsobject --raw-target s3 --limit 25 --progress-every 5
      - uv run fip build-bag-gpkg-silver-verblijfsobject --run-id bag-gpkg-smoke
      - uv run fip build-bag-gpkg-landing-verblijfsobject --run-id bag-gpkg-smoke

  check:
    desc: Run the standard local quality gate
    cmds:
      - task: format
      - task: lint
      - task: typecheck
      - task: test

  dbt-debug:
    desc: Validate the local dbt profile and connection
    cmds:
      - uv run --project sql dbt debug --project-dir sql --profiles-dir sql

  dbt-run:
    desc: Run dbt models against the local landing schema
    cmds:
      - uv run --project sql dbt run --project-dir sql --profiles-dir sql --exclude stg_cbs_eigendom_codes stg_cbs_observations_85036 dim_eigendom mart_municipality_woz_snapshot source:landing.cbs_eigendom_codes source:landing.cbs_observations_85036ned

  dbt-test:
    desc: Run dbt tests against the local landing schema
    cmds:
      - uv run --project sql dbt test --project-dir sql --profiles-dir sql --exclude stg_cbs_eigendom_codes stg_cbs_observations_85036 dim_eigendom mart_municipality_woz_snapshot source:landing.cbs_eigendom_codes source:landing.cbs_observations_85036ned

  dbt-run-woz:
    desc: Run only the 85036NED / WOZ dbt models against the local landing schema
    cmds:
      - uv run --project sql dbt run --project-dir sql --profiles-dir sql --select stg_cbs_eigendom_codes stg_cbs_observations_85036 dim_eigendom mart_municipality_woz_snapshot

  dbt-test-woz:
    desc: Run only the 85036NED / WOZ dbt tests against the local landing schema
    cmds:
      - uv run --project sql dbt test --project-dir sql --profiles-dir sql --select stg_cbs_eigendom_codes stg_cbs_observations_85036 dim_eigendom mart_municipality_woz_snapshot source:landing.cbs_eigendom_codes source:landing.cbs_observations_85036ned

  dbt-run-housing:
    desc: Run only the 85035NED / housing dbt models against the local landing schema
    cmds:
      - uv run --project sql dbt run --project-dir sql --profiles-dir sql --select stg_cbs_observations_85035 mart_municipality_housing_snapshot

  dbt-test-housing:
    desc: Run only the 85035NED / housing dbt tests against the local landing schema
    cmds:
      - uv run --project sql dbt test --project-dir sql --profiles-dir sql --select stg_cbs_observations_85035 mart_municipality_housing_snapshot source:landing.cbs_observations_85035ned

  dbt-test-smoke:
    desc: Run a smoke-sized dbt test selection for the changed CBS, housing, and spatial models
    cmds:
      - uv run --project sql dbt test --project-dir sql --profiles-dir sql --select stg_cbs_observations_85035 stg_cbs_observations_85036 stg_bag_adressen_spatial stg_bag_pand_spatial stg_region_geom mart_bag_region_bridge_comparison mart_cbs_observation_exceptions mart_municipality_housing_snapshot mart_municipality_woz_snapshot mart_bag_data_quality_by_municipality source:landing.cbs_observations_85035ned source:landing.cbs_observations_85036ned source:landing.region_geom

  precommit:
    desc: Run pre-commit on all files
    cmds:
      - uv run pre-commit run --all-files

  version:
    desc: Show the current configured version
    cmds:
      - uv run bump-my-version show current_version

  version-show:
    desc: Show which version bumps are available
    cmds:
      - uv run bump-my-version show-bump

  bump-patch:
    desc: Bump the patch version in pyproject.toml
    cmds:
      - uv run bump-my-version bump patch

  bump-minor:
    desc: Bump the minor version in pyproject.toml
    cmds:
      - uv run bump-my-version bump minor

  bump-major:
    desc: Bump the major version in pyproject.toml
    cmds:
      - uv run bump-my-version bump major
