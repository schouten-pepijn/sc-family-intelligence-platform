version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  env:
    desc: Create .env from .env.template if it does not exist
    cmds:
      - >-
        python -c "from pathlib import Path; src = Path('.env.template'); dst = Path('.env');
        print('Created .env from .env.template') if not dst.exists() and dst.write_text(src.read_text())
        is not None else print('.env already exists')"

  setup:
    desc: Install dependencies and start the local infra with the MinIO bucket initialized
    cmds:
      - task: env
      - task: install
      - task: sql-install
      - task: infra-up
      - task: infra-init

  install:
    desc: Install project dependencies, including dev tools
    cmds:
      - uv sync --dev

  sql-install:
    desc: Install local dbt dependencies for the sql project
    cmds:
      - uv sync --project sql

  infra-up:
    desc: Start the local MinIO, Postgres, and Lakekeeper stack
    cmds:
      - docker compose up -d

  infra-down:
    desc: Stop the local MinIO, Postgres, and Lakekeeper stack
    cmds:
      - docker compose down

  reset-data:
    desc: Stop the stack, remove volumes, and clear local generated data
    cmds:
      - docker compose down -v --remove-orphans
      - >-
        python -c "from pathlib import Path; import shutil;
        paths = [Path('.raw-smoke'), Path('.duckdb'), Path('sql/target'), Path('sql/logs')];
        [shutil.rmtree(path, ignore_errors=True) for path in paths]"

  infra-init:
    desc: Create the local MinIO bucket used by the project
    cmds:
      - docker compose --profile init up minio-init

  format:
    desc: Format the codebase
    cmds:
      - uv run ruff format .

  lint:
    desc: Run lint checks
    cmds:
      - uv run ruff check .

  lint-fix:
    desc: Run lint checks and apply safe fixes
    cmds:
      - uv run ruff check . --fix

  typecheck:
    desc: Run mypy on the src package
    cmds:
      - uv run mypy src

  test:
    desc: Run the unit test suite
    cmds:
      - task: test-unit

  test-unit:
    desc: Run unit tests only
    cmds:
      - uv run pytest tests/unit

  test-integration:
    desc: Run integration tests against the local lakehouse stack
    env:
      FIP_RUN_INTEGRATION: "1"
    cmds:
      - uv run pytest tests/integration -m integration

  test-raw:
    desc: Run the raw landing smoke test against MinIO
    cmds:
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id smoke-raw --target minio
      - >-
        docker compose exec minio sh -lc 'mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
        && mc ls local/fip-lakehouse/raw/cbs/83625NED/smoke-raw/'

  test-all:
    desc: Run unit and integration tests
    cmds:
      - task: test-unit
      - task: test-integration

  cbs-flow:
    desc: "Run the CBS-only local flow: raw, bronze, silver, landing, and dbt"
    cmds:
      - task: infra-up
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id smoke-flow --target minio
      - uv run fip build-gold-measure-codes --table-id 83625NED --run-id smoke-flow --raw-target minio
      - uv run fip build-gold-period-codes --table-id 83625NED --run-id smoke-flow --raw-target minio
      - uv run fip build-gold-region-codes --table-id 83625NED --run-id smoke-flow --raw-target minio
      - uv run fip ingest-cbs --table-id 83625NED --run-id smoke-flow --raw-target minio
      - uv run fip build-cbs-silver-observations --table cbs_observations_83625ned --run-id smoke-flow
      - uv run fip build-landing-observations --table cbs_observations_flat_83625ned --run-id smoke-flow
      - task: dbt-debug
      - task: dbt-run
      - task: dbt-test

  load-all:
    desc: "Load the full CBS + BAG data flow, including bridge and dbt models"
    cmds:
      - task: infra-up
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id load-all --target minio
      - uv run fip archive-bag-raw --run-id load-all --collection verblijfsobject --target minio
      - uv run fip archive-bag-raw --run-id load-all --collection pand --target minio
      - uv run fip archive-bag-raw --run-id load-all --collection adres --target minio
      - uv run fip build-gold-measure-codes --table-id 83625NED --run-id load-all --raw-target minio
      - uv run fip build-gold-period-codes --table-id 83625NED --run-id load-all --raw-target minio
      - uv run fip build-gold-region-codes --table-id 83625NED --run-id load-all --raw-target minio
      - uv run fip ingest-cbs --table-id 83625NED --run-id load-all --raw-target minio
      - uv run fip ingest-bag --collection verblijfsobject --run-id load-all --raw-target minio
      - uv run fip ingest-bag --collection pand --run-id load-all --raw-target minio
      - uv run fip ingest-bag --collection adres --run-id load-all --raw-target minio
      - uv run fip build-cbs-silver-observations --table cbs_observations_83625ned --run-id load-all
      - uv run fip build-bag-silver-verblijfsobject --run-id load-all
      - uv run fip build-bag-silver-pand --run-id load-all
      - uv run fip build-bag-silver-adressen --run-id load-all
      - uv run fip build-landing-observations --table cbs_observations_flat_83625ned --run-id load-all
      - uv run fip build-bag-landing-verblijfsobject --run-id load-all
      - uv run fip build-bag-landing-pand --run-id load-all
      - uv run fip build-bag-landing-adressen --run-id load-all
      - uv run fip build-bag-geo-region-mapping --table bag_adressen_flat --run-id load-all
      - task: dbt-run
      - task: dbt-test

  load-medium:
    desc: "Load the CBS + BAG data flow with medium BAG limits"
    cmds:
      - task: infra-up
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id medium-load --target minio
      - uv run fip archive-bag-raw --run-id medium-load --collection verblijfsobject --target minio --limit 1000
      - uv run fip archive-bag-raw --run-id medium-load --collection pand --target minio --limit 1000
      - uv run fip archive-bag-raw --run-id medium-load --collection adres --target minio --limit 1000
      - uv run fip build-gold-measure-codes --table-id 83625NED --run-id medium-load --raw-target minio
      - uv run fip build-gold-period-codes --table-id 83625NED --run-id medium-load --raw-target minio
      - uv run fip build-gold-region-codes --table-id 83625NED --run-id medium-load --raw-target minio
      - uv run fip ingest-cbs --table-id 83625NED --run-id medium-load --raw-target minio
      - uv run fip ingest-bag --collection verblijfsobject --run-id medium-load --limit 1000 --progress-every 100 --raw-target minio
      - uv run fip ingest-bag --collection pand --run-id medium-load --limit 1000 --progress-every 100 --raw-target minio
      - uv run fip ingest-bag --collection adres --run-id medium-load --limit 1000 --progress-every 100 --raw-target minio
      - uv run fip build-cbs-silver-observations --table cbs_observations_83625ned --run-id medium-load
      - uv run fip build-bag-silver-verblijfsobject --run-id medium-load
      - uv run fip build-bag-silver-pand --run-id medium-load
      - uv run fip build-bag-silver-adressen --run-id medium-load
      - uv run fip build-landing-observations --table cbs_observations_flat_83625ned --run-id medium-load
      - uv run fip build-bag-landing-verblijfsobject --run-id medium-load
      - uv run fip build-bag-landing-pand --run-id medium-load
      - uv run fip build-bag-landing-adressen --run-id medium-load
      - uv run fip build-bag-geo-region-mapping --table bag_adressen_flat --run-id medium-load --limit 1000 --rows 20
      - task: dbt-run
      - task: dbt-test

  load-smoke:
    desc: "Load the full CBS + BAG data flow with small limits"
    cmds:
      - task: infra-up
      - task: infra-init
      - uv run fip archive-cbs-raw --table-id 83625NED --run-id smoke-load --target minio
      - uv run fip archive-bag-raw --run-id smoke-load --collection verblijfsobject --target minio --limit 25
      - uv run fip archive-bag-raw --run-id smoke-load --collection pand --target minio --limit 25
      - uv run fip archive-bag-raw --run-id smoke-load --collection adres --target minio --limit 25
      - uv run fip build-gold-measure-codes --table-id 83625NED --run-id smoke-load --raw-target minio
      - uv run fip build-gold-period-codes --table-id 83625NED --run-id smoke-load --raw-target minio
      - uv run fip build-gold-region-codes --table-id 83625NED --run-id smoke-load --raw-target minio
      - uv run fip ingest-cbs --table-id 83625NED --run-id smoke-load --raw-target minio
      - uv run fip ingest-bag --collection verblijfsobject --run-id smoke-load --limit 25 --progress-every 5 --raw-target minio
      - uv run fip ingest-bag --collection pand --run-id smoke-load --limit 25 --progress-every 5 --raw-target minio
      - uv run fip ingest-bag --collection adres --run-id smoke-load --limit 25 --progress-every 5 --raw-target minio
      - uv run fip build-cbs-silver-observations --table cbs_observations_83625ned --run-id smoke-load
      - uv run fip build-bag-silver-verblijfsobject --run-id smoke-load
      - uv run fip build-bag-silver-pand --run-id smoke-load
      - uv run fip build-bag-silver-adressen --run-id smoke-load
      - uv run fip build-landing-observations --table cbs_observations_flat_83625ned --run-id smoke-load
      - uv run fip build-bag-landing-verblijfsobject --run-id smoke-load
      - uv run fip build-bag-landing-pand --run-id smoke-load
      - uv run fip build-bag-landing-adressen --run-id smoke-load
      - uv run fip build-bag-geo-region-mapping --table bag_adressen_flat --run-id smoke-load --limit 25 --rows 5
      - task: dbt-run
      - task: dbt-test

  check:
    desc: Run the standard local quality gate
    cmds:
      - task: format
      - task: lint
      - task: typecheck
      - task: test

  dbt-debug:
    desc: Validate the local dbt profile and connection
    cmds:
      - uv run --project sql dbt debug --project-dir sql --profiles-dir sql

  dbt-run:
    desc: Run dbt models against the local landing schema
    cmds:
      - uv run --project sql dbt run --project-dir sql --profiles-dir sql

  dbt-test:
    desc: Run dbt tests against the local landing schema
    cmds:
      - uv run --project sql dbt test --project-dir sql --profiles-dir sql

  precommit:
    desc: Run pre-commit on all files
    cmds:
      - uv run pre-commit run --all-files

  version:
    desc: Show the current configured version
    cmds:
      - uv run bump-my-version show current_version

  version-show:
    desc: Show which version bumps are available
    cmds:
      - uv run bump-my-version show-bump

  bump-patch:
    desc: Bump the patch version in pyproject.toml
    cmds:
      - uv run bump-my-version bump patch

  bump-minor:
    desc: Bump the minor version in pyproject.toml
    cmds:
      - uv run bump-my-version bump minor

  bump-major:
    desc: Bump the major version in pyproject.toml
    cmds:
      - uv run bump-my-version bump major
