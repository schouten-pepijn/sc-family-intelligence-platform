version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  env:
    desc: Create .env from .env.template if it does not exist
    cmds:
      - >-
        python -c "from pathlib import Path; src = Path('.env.template'); dst = Path('.env');
        print('Created .env from .env.template') if not dst.exists() and dst.write_text(src.read_text())
        is not None else print('.env already exists')"

  setup:
    desc: Install dependencies and start the local infra with the MinIO bucket initialized
    cmds:
      - task: env
      - task: install
      - task: sql-install
      - task: infra-up
      - task: infra-init

  install:
    desc: Install project dependencies, including dev tools
    cmds:
      - uv sync --dev

  sql-install:
    desc: Install local dbt dependencies for the sql project
    cmds:
      - uv sync --project sql

  infra-up:
    desc: Start the local MinIO, Postgres, and Lakekeeper stack
    cmds:
      - docker compose up -d

  infra-down:
    desc: Stop the local MinIO, Postgres, and Lakekeeper stack
    cmds:
      - docker compose down

  infra-init:
    desc: Create the local MinIO bucket used by the project
    cmds:
      - docker compose --profile init up minio-init

  format:
    desc: Format the codebase
    cmds:
      - uv run ruff format .

  lint:
    desc: Run lint checks
    cmds:
      - uv run ruff check .

  lint-fix:
    desc: Run lint checks and apply safe fixes
    cmds:
      - uv run ruff check . --fix

  typecheck:
    desc: Run mypy on the src package
    cmds:
      - uv run mypy src

  test:
    desc: Run the unit test suite
    cmds:
      - task: test-unit

  test-unit:
    desc: Run unit tests only
    cmds:
      - uv run pytest tests/unit

  test-integration:
    desc: Run integration tests against the local lakehouse stack
    env:
      FIP_RUN_INTEGRATION: "1"
    cmds:
      - uv run pytest tests/integration -m integration

  test-all:
    desc: Run unit and integration tests
    cmds:
      - task: test-unit
      - task: test-integration

  check:
    desc: Run the standard local quality gate
    cmds:
      - task: format
      - task: lint
      - task: typecheck
      - task: test

  dbt-debug:
    desc: Validate the local dbt profile and connection
    cmds:
      - uv run --project sql dbt debug --project-dir sql --profiles-dir sql

  dbt-run:
    desc: Run dbt models against the local landing schema
    cmds:
      - uv run --project sql dbt run --project-dir sql --profiles-dir sql

  dbt-test:
    desc: Run dbt tests against the local landing schema
    cmds:
      - uv run --project sql dbt test --project-dir sql --profiles-dir sql

  precommit:
    desc: Run pre-commit on all files
    cmds:
      - uv run pre-commit run --all-files

  version:
    desc: Show the current configured version
    cmds:
      - uv run bump-my-version show current_version

  version-show:
    desc: Show which version bumps are available
    cmds:
      - uv run bump-my-version show-bump

  bump-patch:
    desc: Bump the patch version in pyproject.toml
    cmds:
      - uv run bump-my-version bump patch

  bump-minor:
    desc: Bump the minor version in pyproject.toml
    cmds:
      - uv run bump-my-version bump minor

  bump-major:
    desc: Bump the major version in pyproject.toml
    cmds:
      - uv run bump-my-version bump major
