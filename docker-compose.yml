services:
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: fip-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  trino:
    image: trinodb/trino:444
    container_name: fip-trino
    ports:
      - "8080:8080"
    volumes:
      - ./ops/trino:/etc/trino
    depends_on:
      - minio

volumes:
  minio_data:
