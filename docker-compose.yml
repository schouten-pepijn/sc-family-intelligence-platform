services:
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: fip-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: fip-minio-init
    profiles:
      - init
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -lc
      - until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done; mc mb --ignore-existing local/${S3_BUCKET}

  trino:
    image: trinodb/trino:479
    container_name: fip-trino
    ports:
      - "8080:8080"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS}
      ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE}
    volumes:
      - ./ops/trino:/etc/trino
    depends_on:
      minio:
        condition: service_started

volumes:
  minio_data:
