services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: fip-rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_CONSOLE_ENABLE: "true"
    command: [ "/data" ]
    volumes:
      - rustfs_data:/data

  rustfs-init:
    image: amazon/aws-cli:latest
    profiles:
      - init
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_REGION}
      AWS_EC2_METADATA_DISABLED: "true"
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT_INTERNAL: ${S3_ENDPOINT_INTERNAL}
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until aws --endpoint-url "${S3_ENDPOINT_INTERNAL}" s3 ls >/dev/null 2>&1; do
          sleep 2
        done
        aws --endpoint-url "${S3_ENDPOINT_INTERNAL}" s3api head-bucket --bucket "${S3_BUCKET}" >/dev/null 2>&1 \
          || aws --endpoint-url "${S3_ENDPOINT_INTERNAL}" s3api create-bucket --bucket "${S3_BUCKET}"

  postgres:
    image: postgres:17
    container_name: fip-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -p 5432 -d ${POSTGRES_DB}" ]
      interval: 2s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/postgres/init-postgis.sql:/docker-entrypoint-initdb.d/01-postgis.sql:ro

  polaris:
    image: ${POLARIS_IMAGE}
    container_name: fip-polaris
    ports:
      - "8181:8181"
      - "8182:8182"
    environment:
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      POLARIS_BOOTSTRAP_CREDENTIALS: ${POLARIS_REALM},${POLARIS_CLIENT_ID},${POLARIS_CLIENT_SECRET}
      polaris.realm-context.realms: ${POLARIS_REALM}
      quarkus.otel.sdk.disabled: "true"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8182/q/health" ]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s

  polaris-setup:
    image: curlimages/curl:8.16.0
    container_name: fip-polaris-setup
    profiles:
      - init
    restart: "no"
    depends_on:
      polaris:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    environment:
      POLARIS_CATALOG_NAME: ${POLARIS_CATALOG_NAME}
      POLARIS_CLIENT_ID: ${POLARIS_CLIENT_ID}
      POLARIS_CLIENT_SECRET: ${POLARIS_CLIENT_SECRET}
      POLARIS_REALM: ${POLARIS_REALM}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ENDPOINT_INTERNAL: ${S3_ENDPOINT_INTERNAL}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        token_response="$$(curl -sS -X POST \
          http://polaris:8181/api/catalog/v1/oauth/tokens \
          -H 'Content-Type: application/x-www-form-urlencoded' \
          -d "grant_type=client_credentials&client_id=$${POLARIS_CLIENT_ID}&client_secret=$${POLARIS_CLIENT_SECRET}&scope=PRINCIPAL_ROLE:ALL")"
        token="$$(printf '%s' "$$token_response" | sed -n 's/.*"access_token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
        if [ -z "$$token" ]; then
          printf '%s\n' "$$token_response"
          exit 1
        fi

        payload="$$(cat <<EOF
        {
          "catalog": {
            "name": "$${POLARIS_CATALOG_NAME}",
            "type": "INTERNAL",
            "readOnly": false,
            "properties": {
              "default-base-location": "s3://$${S3_BUCKET}/warehouse"
            },
            "storageConfigInfo": {
              "storageType": "S3",
              "allowedLocations": ["s3://$${S3_BUCKET}/warehouse"],
              "endpoint": "$${S3_ENDPOINT}",
              "endpointInternal": "$${S3_ENDPOINT_INTERNAL}",
              "pathStyleAccess": true
            }
          }
        }
        EOF
        )"
        code="$$(curl -sS -o /tmp/polaris-catalog.out -w '%{http_code}' \
          -X POST \
          http://polaris:8181/api/management/v1/catalogs \
          -H "Authorization: Bearer $$token" \
          -H "Polaris-Realm: $${POLARIS_REALM}" \
          -H 'Content-Type: application/json' \
          --data "$$payload")"
        case "$$code" in
          200|201|204|409) ;;
          400|500)
            if grep -qi 'already' /tmp/polaris-catalog.out; then
              : # catalog exists, continue
            else
              cat /tmp/polaris-catalog.out
              exit 1
            fi
            ;;
          *)
            cat /tmp/polaris-catalog.out
            exit 1
            ;;
        esac

        code="$$(curl -sS -o /tmp/polaris-role-assign.out -w '%{http_code}' \
          -X PUT \
          http://polaris:8181/api/management/v1/principal-roles/service_admin/catalog-roles/$${POLARIS_CATALOG_NAME} \
          -H "Authorization: Bearer $$token" \
          -H "Polaris-Realm: $${POLARIS_REALM}" \
          -H 'Content-Type: application/json' \
          -d '{"name":"catalog_admin"}')"
        case "$$code" in
          200|201|204|409) ;;
          *) cat /tmp/polaris-role-assign.out; exit 1 ;;
        esac

        code="$$(curl -sS -o /tmp/polaris-grant.out -w '%{http_code}' \
          -X PUT \
          http://polaris:8181/api/management/v1/catalogs/$${POLARIS_CATALOG_NAME}/catalog-roles/catalog_admin/grants \
          -H "Authorization: Bearer $$token" \
          -H "Polaris-Realm: $${POLARIS_REALM}" \
          -H 'Content-Type: application/json' \
          -d '{"grant":{"type":"catalog","privilege":"CATALOG_MANAGE_CONTENT"}}')"
        case "$$code" in
          200|201|204|409) ;;
          *) cat /tmp/polaris-grant.out; exit 1 ;;
        esac

volumes:
  rustfs_data:
  postgres_data:
  postgis_data:
